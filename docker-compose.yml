services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: app_db
    ports:
      # Host port 5433, not 5432 -- the existing (pre-migration) app already has a local
      # Postgres bound to 5432. This is a deliberately separate, fresh database.
      - "127.0.0.1:5433:5432"
    volumes:
      - backend_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - internal

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - internal

  backend:
    build: ./backend
    env_file: ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      # Published to localhost so the Next.js dev server (run on the host via `npm run dev`,
      # not containerized yet) can reach it at http://localhost:8000. In any real deployment
      # this must NOT be published -- only reachable from Next.js's own private network.
      - "127.0.0.1:8000:8000"
    volumes:
      - ./backend:/app
    networks:
      - internal

networks:
  internal:

volumes:
  backend_postgres_data:
