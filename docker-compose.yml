services:
  postgres:
    # pgvector/pgvector:pg16 is postgres:16 plus the pgvector extension pre-built in -- needed for
    # the knowledge-base RAG feature's similarity search. Same Postgres major version/data format
    # as the previous postgres:16-alpine image, so the existing backend_postgres_data volume is
    # compatible; this is a drop-in swap, not a migration.
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: app_db
    ports:
      # Host port 5433, not 5432 -- the existing (pre-migration) app already has a local
      # Postgres bound to 5432. This is a deliberately separate, fresh database.
      - "127.0.0.1:5433:5432"
    volumes:
      - backend_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - internal

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - internal

  backend:
    build: ./backend
    env_file: ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      # Published to localhost so the Next.js dev server (run on the host via `npm run dev`,
      # not containerized yet) can reach it at http://localhost:8000. In any real deployment
      # this must NOT be published -- only reachable from Next.js's own private network.
      - "127.0.0.1:8000:8000"
    volumes:
      - ./backend:/app
    healthcheck:
      # Mirrors backend/Dockerfile's HEALTHCHECK -- compose-level checks are what
      # `depends_on: condition: service_healthy` actually reads, so this needs to exist here too,
      # not just in the image. /api/health sits behind require_internal_auth like every other
      # route, so the shared secret must be sent the same way a real caller would.
      test: ["CMD-SHELL", "curl -f -H \"x-internal-auth: $$INTERNAL_AUTH_SECRET\" http://localhost:8000/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    networks:
      - internal

  # Production-like containerized frontend (see root Dockerfile). NOT the day-to-day dev
  # workflow -- that's still `npm run dev` on the host against this same backend on :8000,
  # unaffected by this service's existence. Bound to 3001 (not 3000) specifically so `docker
  # compose up` never collides with a `npm run dev` you might already have running locally; start
  # this one explicitly with `docker compose up frontend` when you want to test the real
  # production build end-to-end.
  frontend:
    build:
      context: .
      # Build-time only -- see the Dockerfile's own comment on why this can't just be a runtime
      # `environment:` entry like the vars below.
      args:
        NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: "${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}"
        # Same build-time-inlining requirement as the Clerk key above. Empty/unset by default
        # (no real Sentry account exists for this app yet) -- an empty string here still keeps
        # Sentry fully inert, see next.config.ts and src/instrumentation-client.ts.
        NEXT_PUBLIC_SENTRY_DSN: "${NEXT_PUBLIC_SENTRY_DSN}"
        SENTRY_ORG: "${SENTRY_ORG}"
        SENTRY_PROJECT: "${SENTRY_PROJECT}"
        SENTRY_AUTH_TOKEN: "${SENTRY_AUTH_TOKEN}"
    environment:
      # backend:8000 -- the service name IS the hostname on the internal docker network, no
      # published port needed for this hop (unlike the host-dev-server case above).
      BACKEND_URL: "http://backend:8000"
      INTERNAL_AUTH_SECRET: "${INTERNAL_AUTH_SECRET}"
      CLERK_SECRET_KEY: "${CLERK_SECRET_KEY}"
      NODE_ENV: production
    depends_on:
      - backend
    ports:
      - "127.0.0.1:3001:3000"
    healthcheck:
      # Mirrors the root Dockerfile's HEALTHCHECK -- plain unauthenticated GET on "/". src/proxy.ts
      # (Clerk middleware) only redirects "/" away for an AUTHENTICATED request; a cookie-less
      # request from this healthcheck always gets a plain 200.
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    networks:
      - internal

networks:
  internal:

volumes:
  backend_postgres_data:
