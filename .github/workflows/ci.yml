name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend (Next.js)
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          # Required at build time only: NEXT_PUBLIC_* vars get inlined into the client bundle by
          # `next build` (see root Dockerfile's comment on the same requirement). A placeholder is
          # fine here -- CI never talks to a real Clerk instance, it just needs the build to
          # produce a valid bundle.
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: "pk_test_ci-placeholder"

      - name: Audit dependencies (fail on high/critical)
        # Deliberately strict, not overcautious: this app handles user auth/session data via
        # Clerk, so a known-exploitable high/critical dependency should block merges, not just be
        # noted somewhere.
        run: npm audit --audit-level=high

  backend:
    name: Backend (FastAPI)
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/pyproject.toml

      - name: Install backend package (with dev extras)
        working-directory: backend
        run: pip install -e ".[dev]"

      - name: Run tests
        working-directory: backend
        # backend/tests/test_llm.py fully mocks the OpenRouter HTTP calls via respx and never
        # touches a real database (confirmed: no conftest.py, no db fixtures, no DATABASE_URL
        # reads outside Settings() construction) -- so no Postgres service container is needed
        # here. Settings() still requires these fields to be *set* (no defaults), so placeholder
        # values are enough to let the app import successfully.
        run: python -m pytest -q
        env:
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/ci_placeholder"
          OPENROUTER_API_KEY: "ci-placeholder"
          CLERK_SECRET_KEY: "ci-placeholder"
          CLERK_JWT_KEY: "ci-placeholder"
          INTERNAL_AUTH_SECRET: "ci-placeholder"

      - name: Audit dependencies
        working-directory: backend
        # pip-audit isn't added to pyproject.toml's dev deps -- it's a CI-only tool, not something
        # a contributor needs installed locally to run tests, so it's installed ad hoc in this
        # step instead of bloating the project's own dependency tree.
        run: |
          pip install pip-audit
          pip-audit
